name: Deploy Frontend to Azure Web App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AZURE_WEBAPP_NAME: tesorerialamamedellin
      APP_PATH: frontend
      DEPLOY_PATH: frontend-deploy
      NEXT_PUBLIC_API_BASE_URL: https://app-lamamedellin-backend-prod.azurewebsites.net

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.APP_PATH }}

      - name: Build frontend
        run: npm run build
        working-directory: ${{ env.APP_PATH }}

      - name: Prepare deploy package
        run: |
          rm -rf $DEPLOY_PATH
          mkdir -p $DEPLOY_PATH
          cp -R $APP_PATH/.next/standalone/. $DEPLOY_PATH/
          mkdir -p $DEPLOY_PATH/.next
          cp -R $APP_PATH/.next/static $DEPLOY_PATH/.next/static
          if [ -d "$APP_PATH/public" ]; then cp -R $APP_PATH/public $DEPLOY_PATH/public; fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
          package: ${{ env.DEPLOY_PATH }}
